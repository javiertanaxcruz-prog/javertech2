kind = "web"
previewPath = "/"
title = "TechByJaver"
version = "1.0.0"
id = "artifacts/techbyjaver"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19348

[services.development]
run = "pnpm --filter @workspace/techbyjaver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techbyjaver", "run", "build" ]
publicDir = "artifacts/techbyjaver/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19348"
BASE_PATH = "/"
